openapi: 3.1.0
info:
  title: Kalshi BTC 15M Analyst API
  version: 1.0.0
  description: Proxy API for the Kalshi BTC 15-minute analyst GPT.

servers:
  - url: https://kalashi-bot-proxy.onrender.com

paths:
  /get_active_kalshi_market:
    get:
      operationId: get_active_kalshi_market
      summary: Get the active Kalshi BTC 15-minute market
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: series_ticker
          in: query
          required: false
          schema:
            type: string
            default: KXBTC15M
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Active market response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  market:
                    $ref: "#/components/schemas/KalshiMarket"

  /get_kalshi_orderbook:
    get:
      operationId: get_kalshi_orderbook
      summary: Get Kalshi orderbook for a market ticker
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Orderbook response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ticker:
                    type:
                      - string
                      - "null"
                  orderbook:
                    $ref: "#/components/schemas/KalshiOrderbook"

  /get_kalshi_recent_trades:
    get:
      operationId: get_kalshi_recent_trades
      summary: Get recent Kalshi trades for a market ticker
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: lookback_seconds
          in: query
          required: false
          schema:
            type: integer
            default: 1800
      responses:
        "200":
          description: Recent trades response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  cursor:
                    type:
                      - string
                      - "null"
                  trades:
                    type: array
                    items:
                      $ref: "#/components/schemas/KalshiTrade"

  /get_btc_spot_snapshot:
    get:
      operationId: get_btc_spot_snapshot
      summary: Get current BTC spot snapshot
      parameters:
        - name: product_id
          in: query
          required: false
          schema:
            type: string
            default: BTC-USD
      responses:
        "200":
          description: BTC spot snapshot response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  snapshot:
                    $ref: "#/components/schemas/BtcSpotSnapshot"

  /get_btc_candles:
    get:
      operationId: get_btc_candles
      summary: Get BTC candles
      parameters:
        - name: product_id
          in: query
          required: false
          schema:
            type: string
            default: BTC-USD
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            enum: [60, 300, 900, 3600, 21600, 86400]
            default: 60
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: BTC candles response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  product_id:
                    type: string
                  granularity:
                    type: integer
                  raw_count:
                    type: integer
                  candles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Candle"

  /get_btc_orderbook_top:
    get:
      operationId: get_btc_orderbook_top
      summary: Get top BTC orderbook levels
      parameters:
        - name: product_id
          in: query
          required: false
          schema:
            type: string
            default: BTC-USD
        - name: level
          in: query
          required: false
          schema:
            type: integer
            enum: [1, 2, 3]
            default: 1
        - name: top_n
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: BTC orderbook response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  orderbook:
                    $ref: "#/components/schemas/BtcOrderbook"

  /get_recent_btc_news:
    get:
      operationId: get_recent_btc_news
      summary: Get recent BTC news headlines
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent BTC news response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  source:
                    type: string
                  query_url:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsItem"

components:
  schemas:
    KalshiMarket:
      type: object
      properties:
        ticker:
          type:
            - string
            - "null"
        title:
          type:
            - string
            - "null"
        question:
          type:
            - string
            - "null"
        status:
          type:
            - string
            - "null"
        event_ticker:
          type:
            - string
            - "null"
        series_ticker:
          type:
            - string
            - "null"
        floor_strike:
          type:
            - number
            - "null"
        cap_strike:
          type:
            - number
            - "null"
        strike_type:
          type:
            - string
            - "null"
        yes_bid_dollars:
          type:
            - number
            - "null"
        yes_ask_dollars:
          type:
            - number
            - "null"
        no_bid_dollars:
          type:
            - number
            - "null"
        no_ask_dollars:
          type:
            - number
            - "null"
        last_price_dollars:
          type:
            - number
            - "null"
        previous_yes_bid_dollars:
          type:
            - number
            - "null"
        volume:
          type:
            - number
            - "null"
        liquidity:
          type:
            - number
            - "null"
        open_interest:
          type:
            - number
            - "null"
        yes_bid_size_fp:
          type:
            - string
            - "null"
        yes_ask_size_fp:
          type:
            - string
            - "null"
        close_time:
          type:
            - string
            - "null"

    KalshiOrderbook:
      type: object
      properties:
        best_yes_bid_dollars:
          type:
            - number
            - "null"
        best_yes_ask_dollars:
          type:
            - number
            - "null"
        best_no_bid_dollars:
          type:
            - number
            - "null"
        best_no_ask_dollars:
          type:
            - number
            - "null"
        yes_bids:
          type: array
          items:
            type: array
            items:
              type:
                - string
                - number
        no_bids:
          type: array
          items:
            type: array
            items:
              type:
                - string
                - number

    KalshiTrade:
      type: object
      properties:
        trade_id:
          type:
            - string
            - "null"
        ticker:
          type:
            - string
            - "null"
        count_fp:
          type:
            - string
            - "null"
        yes_price_dollars:
          type:
            - number
            - "null"
        no_price_dollars:
          type:
            - number
            - "null"
        taker_side:
          type:
            - string
            - "null"
        created_time:
          type:
            - string
            - "null"

    BtcSpotSnapshot:
      type: object
      properties:
        product_id:
          type: string
        price:
          type:
            - number
            - "null"
        bid:
          type:
            - number
            - "null"
        ask:
          type:
            - number
            - "null"
        size:
          type:
            - number
            - "null"
        trade_time:
          type:
            - string
            - "null"
        trade_id:
          type:
            - integer
            - "null"
        volume_24h:
          type:
            - number
            - "null"
        open_24h:
          type:
            - number
            - "null"
        high_24h:
          type:
            - number
            - "null"
        low_24h:
          type:
            - number
            - "null"
        last_24h:
          type:
            - number
            - "null"
        volume_30d:
          type:
            - number
            - "null"

    Candle:
      type: object
      properties:
        time:
          type: string
        low:
          type:
            - number
            - "null"
        high:
          type:
            - number
            - "null"
        open:
          type:
            - number
            - "null"
        close:
          type:
            - number
            - "null"
        volume:
          type:
            - number
            - "null"

    BtcOrderbook:
      type: object
      properties:
        product_id:
          type: string
        level:
          type: integer
        top_n:
          type: integer
        sequence:
          type:
            - integer
            - "null"
        time:
          type:
            - string
            - "null"
        best_bid:
          type:
            - object
            - "null"
          properties:
            price:
              type:
                - number
                - "null"
            size:
              type:
                - number
                - "null"
            num_orders:
              type:
                - integer
                - "null"
        best_ask:
          type:
            - object
            - "null"
          properties:
            price:
              type:
                - number
                - "null"
            size:
              type:
                - number
                - "null"
            num_orders:
              type:
                - integer
                - "null"
        bids:
          type: array
          items:
            type: array
            items:
              type:
                - string
                - number
                - integer
        asks:
          type: array
          items:
            type: array
            items:
              type:
                - string
                - number
                - integer

    NewsItem:
      type: object
      properties:
        title:
          type:
            - string
            - "null"
        link:
          type:
            - string
            - "null"
        source:
          type:
            - string
            - "null"
        published_at:
          type:
            - string
            - "null"
